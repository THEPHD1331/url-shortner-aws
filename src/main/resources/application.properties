spring.application.name=URLShortner
server.port=8880
# DATA SOURCE
#spring.datasource.url=jdbc:h2:mem:url_shortner_db
spring.datasource.url=jdbc:h2:file:./my_db/url_shortner_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=paras
spring.datasource.password=paras123

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 CONSOLE
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.redis.host=localhost
spring.redis.port=6379
